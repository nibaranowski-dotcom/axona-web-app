<!-- @dsCard group="Components" viewport="700x230" name="Core — buttons, chips, badges" subtitle="Actions, tab chips, status badges, stat chips" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:24px}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;color:var(--ink-faint);width:70px;text-transform:uppercase}</style></head>
<body><div id="root"></div>
<script type="text/babel">
const NS = Object.values(window).find(v => v && v.Button && v.Chip && v.Badge) || {};
const { Button, Chip, Badge, StatChip } = NS;
function Demo(){return (
  <div>
    <div className="row"><span className="lbl">Buttons</span>
      <Button variant="primary">Book a demo</Button>
      <Button variant="dark">See a demo</Button>
      <Button variant="ghost">See what it does</Button>
      <Button variant="primary" size="sm">Small</Button>
    </div>
    <div className="row"><span className="lbl">Chips</span>
      <Chip active>Procurement</Chip><Chip>Manufacturing</Chip><Chip>Quality &amp; Test</Chip><Chip>Logistics</Chip>
    </div>
    <div className="row"><span className="lbl">Badges</span>
      <Badge tone="accent">Coming soon</Badge><Badge tone="success">Auto-applied</Badge><Badge tone="neutral">Beta</Badge>
    </div>
    <div className="row"><span className="lbl">Stat</span>
      <StatChip label="POs drafted" value="13,422" /><StatChip label="Units traced" value="3,280" /><StatChip value="7,491,284 parts" />
    </div>
  </div>
);}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
