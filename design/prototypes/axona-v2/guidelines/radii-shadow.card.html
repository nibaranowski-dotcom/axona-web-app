<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & shadow" subtitle="Pills, cards, panels + float shadow" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:24px;display:flex;gap:18px;align-items:center}
.box{background:#fff;border:1px solid var(--line-panel);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--ink-faint)}
.b1{width:120px;height:36px;border-radius:var(--r-pill)}
.b2{width:120px;height:48px;border-radius:var(--r-btn)}
.b3{width:120px;height:96px;border-radius:var(--r-card)}
.b4{width:120px;height:96px;border-radius:var(--r-card);box-shadow:var(--shadow-float);border:none}</style></head>
<body>
<div class="box b1">pill 999</div>
<div class="box b2">btn 8</div>
<div class="box b3">card 14</div>
<div class="box b4">float shadow</div>
</body></html>
