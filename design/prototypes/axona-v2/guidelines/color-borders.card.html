<!-- @dsCard group="Colors" viewport="700x130" name="Borders & hairlines" subtitle="Line weights on paper and panels" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--paper)}
.row{display:flex;gap:14px;padding:22px}
.b{flex:1;height:64px;border-radius:10px;background:var(--paper);display:flex;align-items:flex-end;padding:9px;box-sizing:border-box}
.b span{font-family:var(--font-mono);font-size:9.5px;color:var(--ink-faint)}</style></head>
<body><div class="row">
<div class="b" style="border:1px solid var(--line)"><span>--line #ededed</span></div>
<div class="b" style="border:1px solid var(--line-panel);background:var(--panel)"><span>--line-panel #e7e7e1</span></div>
<div class="b" style="border:1px solid var(--line-strong)"><span>--line-strong #e2e2e2</span></div>
<div class="b" style="border:1px solid var(--line-dark);background:var(--ink-strong)"><span style="color:var(--on-dark-faint)">--line-dark #1d1d1d</span></div>
</div></body></html>
