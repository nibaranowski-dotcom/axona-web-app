<!-- @dsCard group="Type" viewport="700x140" name="Mono — data & labels" subtitle="JetBrains Mono, uppercased eyebrows + chips" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:22px}
.ey{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;color:var(--mono-faint);text-transform:uppercase}
.chips{display:flex;gap:10px;margin-top:16px}
.chip{font-family:var(--font-mono);font-size:11.5px;font-weight:500;background:var(--panel);border:1px solid var(--line-panel);border-radius:5px;padding:3px 8px}
.cap{font-family:var(--font-mono);font-size:10px;color:var(--mono-ghost);margin-top:16px}</style></head>
<body>
<div class="ey">PARTS UNDER MANAGEMENT BY AXONA</div>
<div class="chips"><span class="chip">7,491,284 parts</span><span class="chip">POS DRAFTED: 13,422</span><span class="chip">UNITS TRACED: 3,280</span></div>
<div class="cap">[ CAPTION · INSIDE MOCK UI ]</div>
</body></html>
