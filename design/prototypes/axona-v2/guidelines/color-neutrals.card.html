<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — warm grey ramp" subtitle="Paper, panels, ink and muted text" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--paper)}
.row{display:flex;gap:0;padding:20px}
.sw{flex:1;height:88px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid var(--line)}
.sw b{font-size:11px;font-weight:600}.sw span{font-family:var(--font-mono);font-size:9.5px;opacity:.7}
.row .sw + .sw{margin-left:10px}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--paper)"><b>Paper</b><span>#ffffff</span></div>
<div class="sw" style="background:var(--panel)"><b>Panel</b><span>#f4f3ef</span></div>
<div class="sw" style="background:var(--panel-2)"><b>Panel 2</b><span>#f7f2eb</span></div>
<div class="sw" style="background:var(--ink-muted);color:#fff"><b>Ink muted</b><span>#6b6b63</span></div>
<div class="sw" style="background:var(--ink-strong);color:#fff"><b>Ink strong</b><span>#0a0a0a</span></div>
</div></body></html>
