<!-- @dsCard group="Colors" viewport="700x150" name="Accent + status" subtitle="Lime accent, hover, and functional green" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--paper)}
.row{display:flex;gap:10px;padding:20px}
.sw{flex:1;height:88px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid var(--line)}
.sw b{font-size:11px;font-weight:600}.sw span{font-family:var(--font-mono);font-size:9.5px;opacity:.7}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--accent)"><b>Accent</b><span>#c6f24f</span></div>
<div class="sw" style="background:var(--accent-hover)"><b>Accent hover</b><span>#bce83f</span></div>
<div class="sw" style="background:var(--success);color:#fff"><b>Success</b><span>#1f9e6f</span></div>
<div class="sw" style="background:var(--success-tint)"><b>Success tint</b><span>#e9f7f0</span></div>
</div></body></html>
