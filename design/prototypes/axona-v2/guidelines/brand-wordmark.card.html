<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark + lockup" subtitle="Lowercase wordmark with geometric mark" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:24px;display:flex;gap:40px;align-items:center}
.lock{display:flex;align-items:center;gap:8px}
.wm{font-size:30px;font-weight:700;letter-spacing:-.04em;color:var(--ink-strong)}
.mark{width:17px;height:17px;background:var(--ink-strong);border-radius:0 9px 0 9px}
.dark{background:var(--ink-strong);border-radius:12px;padding:16px 22px}
.dark .wm{color:#fff}.dark .mark{background:#fff}</style></head>
<body>
<div class="lock"><span class="wm">axona</span><span class="mark"></span></div>
<div class="lock dark"><span class="wm">axona</span><span class="mark"></span></div>
</body></html>
