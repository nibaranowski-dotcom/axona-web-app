<!-- @dsCard group="Spacing" viewport="700x130" name="Spacing scale" subtitle="4px base unit" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:22px}
.row{display:flex;align-items:flex-end;gap:14px}
.col{text-align:center}
.bar{background:var(--accent);border-radius:3px;width:30px}
.col span{display:block;font-family:var(--font-mono);font-size:9.5px;color:var(--ink-faint);margin-top:6px}</style></head>
<body><div class="row">
<div class="col"><div class="bar" style="height:8px"></div><span>2 · 8</span></div>
<div class="col"><div class="bar" style="height:12px"></div><span>3 · 12</span></div>
<div class="col"><div class="bar" style="height:16px"></div><span>4 · 16</span></div>
<div class="col"><div class="bar" style="height:24px"></div><span>6 · 24</span></div>
<div class="col"><div class="bar" style="height:32px"></div><span>8 · 32</span></div>
<div class="col"><div class="bar" style="height:48px"></div><span>12 · 48</span></div>
<div class="col"><div class="bar" style="height:64px"></div><span>16 · 64</span></div>
</div></body></html>
