# Axona local dev infrastructure (FND.3).
#   docker compose up -d
# Credentials/ports come from .env (copy .env.example). Values below are
# dev-only defaults — never commit real secrets.
name: axona

services:
  # --- Postgres + pgvector ---------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: axona-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-axona}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axona}
      POSTGRES_DB: ${POSTGRES_DB:-axona}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Runs once on first init (empty data dir): enables the `vector` extension.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axona} -d ${POSTGRES_DB:-axona}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Redis (BullMQ queues) -------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: axona-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- MinIO (S3-compatible blob store) -------------------------------------
  minio:
    image: minio/minio:latest
    container_name: axona-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-axona}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-axona-secret}
    ports:
      - "${S3_PORT:-9000}:9000" # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- One-shot: create the app bucket on first boot -------------------------
  createbuckets:
    image: minio/mc:latest
    container_name: axona-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-axona} ${MINIO_ROOT_PASSWORD:-axona-secret} &&
      mc mb --ignore-existing local/${S3_BUCKET:-axona-files} &&
      echo 'minio bucket ready: ${S3_BUCKET:-axona-files}'
      "
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  minio-data:
